<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BeamAi - Pad Foundation Design</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2316243B'/><text x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-weight='bold' font-size='20' fill='%23F5A623'>B</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper: '#EEF1F4',
          ink:   '#16243B',
          steel: '#5E7081',
          grid:  '#D7E0EA',
          orange:'#E8623A',
          teal:  '#2F8F6F',
          blue:  '#3B6EA5',
          surface:'#FFFFFF',
          amber:   '#F5A623',
        },
        fontFamily: {
          display: ['Space Grotesk','sans-serif'],
          body: ['IBM Plex Sans','sans-serif'],
          mono: ['IBM Plex Mono','monospace']
        }
      }
    }
  }
</script>
<style>
  body{
    background-color:#EEF1F4;
    background-image:
      linear-gradient(to right, #D7E0EA 1px, transparent 1px),
      linear-gradient(to bottom, #D7E0EA 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .section-tag{ font-variant-numeric: tabular-nums; }
  .fade-in{ animation: fadeIn .4s ease-out; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:translateY(0)} }
  @media (prefers-reduced-motion: reduce){ .fade-in{ animation:none; } }
  svg text{ font-family:'IBM Plex Mono', monospace; }
</style>
</head>
<body class="text-ink font-body min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-grid bg-surface/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-baseline gap-3">
        <span class="font-display font-bold text-xl tracking-tight text-ink">Beam<span class="text-amber">Ai</span></span>
        <span class="font-mono text-[11px] uppercase tracking-[0.2em] text-steel hidden sm:inline">foundation design workspace</span>
      </div>
      <div class="flex items-center gap-2 sm:gap-3">
        <div id="workspaceSwitcher"></div>
        <div id="userMenu"></div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 pb-20 flex-1 w-full">

    <!-- Error banner -->
    <div id="errorBanner" class="hidden fixed top-4 right-4 z-50 max-w-md w-[calc(100%-2rem)] sm:w-auto bg-surface shadow-lg border border-orange rounded-lg p-4 flex items-start justify-between gap-3 fade-in">
      <div class="flex items-start gap-3 flex-1">
        <span class="text-orange text-lg font-bold">&#9888;</span>
        <div>
          <p class="font-display text-sm font-semibold text-orange mb-1">Something went wrong</p>
          <p id="errorMessage" class="font-body text-sm text-orange/80"></p>
        </div>
      </div>
      <button id="errorClose" class="text-orange/60 hover:text-orange transition-colors flex-shrink-0">&#10005;</button>
    </div>

    <!-- 00 Prompt -->
    <section class="pt-10">
      <div class="flex items-center gap-3 mb-3">
        <span class="font-mono text-xs text-steel section-tag">00</span>
        <h2 class="font-display text-sm font-semibold uppercase tracking-[0.18em]">Input</h2>
        <div class="h-px flex-1 bg-grid"></div>
      </div>
      <div class="bg-surface border border-grid rounded-lg p-4 shadow-sm">
        <textarea id="promptInput" rows="3"
          class="w-full resize-none font-body text-[15px] leading-relaxed text-ink placeholder-steel/60 focus:outline-none focus:ring-2 focus:ring-blue/40 rounded-md p-2 -m-2"
          placeholder="e.g. &quot;A 300×300 column carrying 900kN on a 2m×2m pad, 500mm deep, allowable bearing pressure 200 kPa&quot;"></textarea>
        <div class="flex justify-end mt-1.5">
          <span id="wordCount" class="font-mono text-[11px] text-steel">0/500</span>
        </div>

        <!-- Advanced settings -->
        <div class="mt-3 border-t border-grid pt-3">
          <button id="dsAdvancedBtn" class="flex items-center gap-2 font-mono text-[11px] text-steel hover:text-ink transition-colors">
            <svg id="dsAdvChevron" width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transition-transform duration-200">
              <polyline points="4 6 8 10 12 6"/>
            </svg>
            Advanced settings
            <span class="text-[9px] text-steel/40 ml-0.5 uppercase tracking-wider">(optional)</span>
          </button>

          <div id="dsAdvancedPanel" class="hidden mt-3 bg-paper rounded-lg p-4 space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-4">
              <div class="space-y-3">
                <div>
                  <p class="font-mono text-[10px] text-steel/60 uppercase tracking-[0.15em] mb-1.5">Design Code</p>
                  <div class="inline-flex rounded border border-grid overflow-hidden">
                    <button data-ds="code" data-val="BS8110" disabled class="ds-toggle font-mono text-[11px] px-3 py-1 bg-surface text-steel/30 cursor-not-allowed opacity-40">BS8110</button>
                    <button data-ds="code" data-val="EC2" class="ds-toggle font-mono text-[11px] px-3 py-1 bg-ink text-paper transition-colors">EC2</button>
                  </div>
                </div>
                <div>
                  <p class="font-mono text-[10px] text-steel/60 uppercase tracking-[0.15em] mb-1.5">f<sub>cu</sub> / f<sub>ck</sub> (N/mm²)</p>
                  <div class="flex flex-wrap gap-1">
                    <button data-ds="fck" data-val="20" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">20</button>
                    <button data-ds="fck" data-val="25" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">25</button>
                    <button data-ds="fck" data-val="30" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-ink text-paper transition-colors">30</button>
                    <button data-ds="fck" data-val="35" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">35</button>
                    <button data-ds="fck" data-val="40" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">40</button>
                    <input id="dsFckCustom" type="number" min="1" placeholder="other" class="font-mono text-[11px] w-14 px-2 py-0.5 rounded border border-grid bg-surface text-ink placeholder-steel/40 focus:outline-none focus:border-blue/60">
                  </div>
                </div>
                <div>
                  <p class="font-mono text-[10px] text-steel/60 uppercase tracking-[0.15em] mb-1.5">f<sub>y</sub> (N/mm²)</p>
                  <div class="flex flex-wrap gap-1">
                    <button data-ds="fyk" data-val="250" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">250</button>
                    <button data-ds="fyk" data-val="410" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">410</button>
                    <button data-ds="fyk" data-val="460" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">460</button>
                    <button data-ds="fyk" data-val="500" class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-ink text-paper transition-colors">500</button>
                    <input id="dsFykCustom" type="number" min="1" placeholder="other" class="font-mono text-[11px] w-14 px-2 py-0.5 rounded border border-grid bg-surface text-ink placeholder-steel/40 focus:outline-none focus:border-blue/60">
                  </div>
                </div>
              </div>
              <div class="space-y-3">
                <div>
                  <p class="font-mono text-[10px] text-steel/60 uppercase tracking-[0.15em] mb-1.5">Nominal Cover (mm)</p>
                  <div class="flex flex-wrap gap-1">
                    <button data-ds="cover" data-val="40"  class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">40</button>
                    <button data-ds="cover" data-val="50"  class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-ink text-paper transition-colors">50</button>
                    <button data-ds="cover" data-val="75"  class="ds-chip font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">75</button>
                    <input id="dsCoverCustom" type="number" min="1" placeholder="other" class="font-mono text-[11px] w-14 px-2 py-0.5 rounded border border-grid bg-surface text-ink placeholder-steel/40 focus:outline-none focus:border-blue/60">
                  </div>
                </div>
                <div>
                  <p class="font-mono text-[10px] text-steel/60 uppercase tracking-[0.15em] mb-1.5">Preferred bar sizes</p>
                  <div class="flex flex-wrap gap-1">
                    <button data-ds="bars" data-val="T12" class="ds-multi font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">T12</button>
                    <button data-ds="bars" data-val="T16" class="ds-multi font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">T16</button>
                    <button data-ds="bars" data-val="T20" class="ds-multi font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">T20</button>
                    <button data-ds="bars" data-val="T25" class="ds-multi font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">T25</button>
                    <button data-ds="bars" data-val="T32" class="ds-multi font-mono text-[11px] px-2 py-0.5 rounded border border-grid bg-surface text-ink hover:border-ink/40 transition-colors">T32</button>
                  </div>
                  <p class="font-mono text-[10px] text-steel/40 mt-1 italic">leave unset — engine picks freely</p>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="flex justify-end mt-2 pt-3 border-t border-grid">
          <button id="runBtn" class="font-display text-sm font-semibold bg-ink text-paper px-5 py-2 rounded-md hover:bg-blue transition-colors focus:outline-none focus:ring-2 focus:ring-blue/50 focus:ring-offset-2 focus:ring-offset-surface">
            Run foundation design
          </button>
        </div>
      </div>
    </section>

    <!-- Loading state -->
    <section id="loadingState" class="pt-10 hidden">
      <div class="bg-surface border border-grid rounded-lg p-12 shadow-sm flex flex-col items-center justify-center gap-4">
        <div class="flex gap-2">
          <div class="w-2 h-2 rounded-full bg-blue animate-pulse"></div>
          <div class="w-2 h-2 rounded-full bg-blue animate-pulse" style="animation-delay: 0.2s"></div>
          <div class="w-2 h-2 rounded-full bg-blue animate-pulse" style="animation-delay: 0.4s"></div>
        </div>
        <p class="font-mono text-sm text-steel">Designing your foundation…</p>
      </div>
    </section>

  </main>

  <footer class="border-t-2 border-grid bg-surface">
    <div class="max-w-6xl mx-auto px-6 py-5 flex flex-wrap justify-between items-center gap-3">
      <span class="font-mono text-xs text-steel">BeamAi · structural analysis &amp; design tool</span>
      <a href="https://mail.google.com/mail/?view=cm&to=adelekeyahaya05@gmail.com&su=BeamAi%20Bug%20Report&body=Describe%20the%20issue%20below%3A%0A%0A" target="_blank" rel="noopener noreferrer"
        class="flex items-center gap-1.5 font-mono text-xs font-semibold text-orange border border-orange/40 rounded px-3 py-1.5 hover:bg-orange hover:text-paper transition-colors">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="11" r="0.5" fill="currentColor"/>
        </svg>
        Report an issue
      </a>
    </div>
  </footer>

<script src="js/nav.js"></script>
<script>renderNav('foundation');</script>
<script src="js/foundation.js"></script>
</body>
</html>
