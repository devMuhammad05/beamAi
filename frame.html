<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BeamAi - 2D Frame Analysis</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2316243B'/><text x='16' y='23' text-anchor='middle' font-family='Georgia,serif' font-weight='bold' font-size='20' fill='%23F5A623'>B</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          paper: '#EEF1F4',
          ink:   '#16243B',
          steel: '#5E7081',
          grid:  '#D7E0EA',
          orange:'#E8623A',
          teal:  '#2F8F6F',
          blue:  '#3B6EA5',
          surface:'#FFFFFF',
          amber:   '#F5A623',
          critical:'#C0392B',
        },
        fontFamily: {
          display: ['Space Grotesk','sans-serif'],
          body: ['IBM Plex Sans','sans-serif'],
          mono: ['IBM Plex Mono','monospace']
        }
      }
    }
  }
</script>
<style>
  body{
    background-color:#EEF1F4;
    background-image:
      linear-gradient(to right, #D7E0EA 1px, transparent 1px),
      linear-gradient(to bottom, #D7E0EA 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .section-tag{ font-variant-numeric: tabular-nums; }
  .fade-in{ animation: fadeIn .4s ease-out; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:translateY(0)} }
  @media (prefers-reduced-motion: reduce){ .fade-in{ animation:none; } }
  svg text{ font-family:'IBM Plex Mono', monospace; }
  #frameCanvas{ cursor: crosshair; touch-action: none; }
  #frameCanvas.mode-select{ cursor: default; }
  #frameCanvas.mode-delete{ cursor: not-allowed; }
</style>
</head>
<body class="text-ink font-body min-h-screen flex flex-col">

  <!-- Header -->
  <header class="border-b border-grid bg-surface/80 backdrop-blur sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-baseline gap-3">
        <span class="font-display font-bold text-xl tracking-tight text-ink">Beam<span class="text-amber">Ai</span></span>
        <span class="font-mono text-[11px] uppercase tracking-[0.2em] text-steel hidden sm:inline">2d frame analysis workspace</span>
      </div>
      <div class="flex items-center gap-2 sm:gap-3">
        <div id="workspaceSwitcher"></div>
        <div id="userMenu"></div>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 pb-20 flex-1 w-full">

    <!-- Error banner -->
    <div id="errorBanner" class="hidden fixed top-4 right-4 z-50 max-w-md w-[calc(100%-2rem)] sm:w-auto bg-surface shadow-lg border border-orange rounded-lg p-4 flex items-start justify-between gap-3 fade-in">
      <div class="flex items-start gap-3 flex-1">
        <span class="text-orange text-lg font-bold">⚠</span>
        <div>
          <p class="font-display text-sm font-semibold text-orange mb-1">Something went wrong</p>
          <p id="errorMessage" class="font-body text-sm text-orange/80"></p>
        </div>
      </div>
      <button id="errorClose" class="text-orange/60 hover:text-orange transition-colors flex-shrink-0">✕</button>
    </div>

    <!-- 00 Toolbar -->
    <section class="pt-10">
      <div class="flex items-center gap-3 mb-3">
        <span class="font-mono text-xs text-steel section-tag">00</span>
        <h2 class="font-display text-sm font-semibold uppercase tracking-[0.18em]">Builder</h2>
        <div class="h-px flex-1 bg-grid"></div>
      </div>
      <div class="bg-surface border border-grid rounded-lg p-3 shadow-sm flex flex-wrap items-center gap-3">
        <div class="inline-flex rounded border border-grid overflow-hidden">
          <button data-mode="add-node"   class="mode-btn font-mono text-[11px] px-3 py-1.5 transition-colors">+ Node</button>
          <button data-mode="add-member" class="mode-btn font-mono text-[11px] px-3 py-1.5 transition-colors">+ Member</button>
          <button data-mode="select"     class="mode-btn font-mono text-[11px] px-3 py-1.5 transition-colors">Select</button>
          <button data-mode="delete"     class="mode-btn font-mono text-[11px] px-3 py-1.5 transition-colors">Delete</button>
        </div>
        <label class="flex items-center gap-1.5 font-mono text-[11px] text-steel">
          Grid
          <select id="gridSnap" class="font-mono text-[11px] border border-grid rounded px-1.5 py-1 bg-surface text-ink focus:outline-none">
            <option value="0.25">0.25 m</option>
            <option value="0.5" selected>0.5 m</option>
            <option value="1">1 m</option>
          </select>
        </label>
        <div class="ml-auto flex items-center gap-2">
          <button id="clearBtn" class="font-mono text-[11px] text-steel hover:text-orange transition-colors px-2 py-1.5">Clear frame</button>
          <button id="runBtn" class="font-display text-sm font-semibold bg-ink text-paper px-5 py-2 rounded-md hover:bg-blue transition-colors focus:outline-none focus:ring-2 focus:ring-blue/50 focus:ring-offset-2 focus:ring-offset-surface">
            Run Analysis
          </button>
        </div>
      </div>
    </section>

    <!-- 01 Canvas + Inspector -->
    <section class="pt-8">
      <div class="flex items-center gap-3 mb-3">
        <span class="font-mono text-xs text-steel section-tag">01</span>
        <h2 class="font-display text-sm font-semibold uppercase tracking-[0.18em]">Frame Model</h2>
        <div class="h-px flex-1 bg-grid"></div>
      </div>
      <div class="grid lg:grid-cols-[1fr_320px] gap-5 items-start">
        <div class="bg-surface border border-grid rounded-lg shadow-sm overflow-hidden relative">
          <svg id="frameCanvas" viewBox="0 0 800 520" class="w-full h-[520px] block"></svg>
          <div id="nodeTooltip" class="hidden absolute z-10 pointer-events-none font-mono text-[10px] bg-ink text-paper px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap"></div>
        </div>
        <div id="inspector" class="bg-surface border border-grid rounded-lg shadow-sm p-4 lg:sticky lg:top-24 space-y-3">
          <p class="font-mono text-[10px] text-steel/60 uppercase tracking-[0.15em]">Inspector</p>
          <p class="font-mono text-[12px] text-steel">Select a node or member to edit its properties, or use <span class="text-ink">+ Node</span> / <span class="text-ink">+ Member</span> to build the frame.</p>
        </div>
      </div>
    </section>

    <!-- Loading state -->
    <section id="loadingState" class="pt-10 hidden">
      <div class="bg-surface border border-grid rounded-lg p-12 shadow-sm flex flex-col items-center justify-center gap-4">
        <div class="flex gap-2">
          <div class="w-2 h-2 rounded-full bg-blue animate-pulse"></div>
          <div class="w-2 h-2 rounded-full bg-blue animate-pulse" style="animation-delay: 0.2s"></div>
          <div class="w-2 h-2 rounded-full bg-blue animate-pulse" style="animation-delay: 0.4s"></div>
        </div>
        <p class="font-mono text-sm text-steel">Solving frame…</p>
      </div>
    </section>

  </main>

  <footer class="border-t-2 border-grid bg-surface">
    <div class="max-w-6xl mx-auto px-6 py-5 flex flex-wrap justify-between items-center gap-3">
      <span class="font-mono text-xs text-steel">BeamAi · structural analysis &amp; design tool</span>
      <a href="https://mail.google.com/mail/?view=cm&to=adelekeyahaya05@gmail.com&su=BeamAi%20Bug%20Report&body=Describe%20the%20issue%20below%3A%0A%0A" target="_blank" rel="noopener noreferrer"
        class="flex items-center gap-1.5 font-mono text-xs font-semibold text-orange border border-orange/40 rounded px-3 py-1.5 hover:bg-orange hover:text-paper transition-colors">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="11" r="0.5" fill="currentColor"/>
        </svg>
        Report an issue
      </a>
    </div>
  </footer>


<script src="js/nav.js"></script>
<script>renderNav('frame');</script>
<script src="js/frame.js"></script>
<script src="js/frame-results.js"></script>
</body>
</html>
